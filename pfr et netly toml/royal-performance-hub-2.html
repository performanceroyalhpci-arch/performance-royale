<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Performance Royale — Bien-être & Virilité Masculine Premium</title>
<meta name="description" content="Performance Royale : la marque premium dédiée au bien-être, à la virilité, l'endurance, la domination et la confiance des hommes d'exception." />
<!-- ===========================================================
     Sécurité : ces balises meta sont un filet de sécurité côté
     navigateur. X-Frame-Options n'a AUCUN effet via <meta> (les
     navigateurs l'ignorent) : c'est répété en HTTP réel dans
     netlify.toml, qui doit être présent sur le déploiement final.
     CSP : 'unsafe-inline' sur script-src reste nécessaire tant que
     les gestionnaires onclick="..." du panel admin n'ont pas été
     convertis en addEventListener (voir notes de fin de fichier).
     =========================================================== -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; base-uri 'self'; form-action 'self'; object-src 'none'" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="referrer" content="strict-origin-when-cross-origin" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
<style>
/* ===========================================================
   Performance Royale — Design System (reproduit du projet Lovable)
   Navy 65% / White 25% / Emerald 7% / Gold 2% / Red 1%
   =========================================================== */

:root {
  --radius: 0.5rem;

  --navy: oklch(0.25 0.08 260);
  --navy-deep: oklch(0.18 0.07 260);
  --navy-soft: oklch(0.32 0.08 260);
  --emerald: oklch(0.52 0.13 165);
  --emerald-soft: oklch(0.62 0.11 165);
  --gold: oklch(0.78 0.13 85);
  --gold-soft: oklch(0.86 0.09 85);
  --promo: oklch(0.48 0.21 25);

  --background: oklch(0.99 0.005 250);
  --foreground: oklch(0.18 0.07 260);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.18 0.07 260);
  --primary: var(--navy);
  --primary-foreground: oklch(0.99 0.005 250);
  --secondary: oklch(0.96 0.01 250);
  --secondary-foreground: var(--navy);
  --muted: oklch(0.96 0.01 250);
  --muted-foreground: oklch(0.45 0.04 260);
  --accent: var(--emerald);
  --accent-foreground: oklch(0.99 0.005 250);
  --destructive: var(--promo);
  --destructive-foreground: oklch(0.99 0.005 250);
  --border: oklch(0.9 0.015 255);
  --input: oklch(0.92 0.012 255);
  --ring: var(--navy);

  --gradient-royal: linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 50%, var(--navy-soft) 100%);
  --gradient-emerald: linear-gradient(135deg, var(--navy-deep) 0%, var(--emerald) 100%);
  --gradient-gold: linear-gradient(135deg, var(--gold) 0%, var(--gold-soft) 100%);
  --shadow-elegant: 0 20px 60px -20px color-mix(in oklab, var(--navy) 35%, transparent);
  --shadow-gold: 0 10px 40px -10px color-mix(in oklab, var(--gold) 40%, transparent);
  --shadow-card: 0 4px 24px -8px color-mix(in oklab, var(--navy) 15%, transparent);

  --font-display: "Cormorant Garamond", "Playfair Display", serif;
  --font-sans: "Inter", system-ui, sans-serif;
}

* { box-sizing: border-box; border-color: var(--border); }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background-color: var(--background);
  color: var(--foreground);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { font-family: var(--font-display); letter-spacing: -0.01em; margin: 0; }
p { margin: 0; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { display: block; max-width: 100%; }
ul { list-style: none; margin: 0; padding: 0; }

.container-royal { margin-left: auto; margin-right: auto; width: 100%; max-width: 80rem; padding-left: 1.25rem; padding-right: 1.25rem; }
@media (min-width: 640px) { .container-royal { padding-left: 2rem; padding-right: 2rem; } }
@media (min-width: 1024px) { .container-royal { padding-left: 3rem; padding-right: 3rem; } }

.text-gradient-gold {
  background: var(--gradient-gold);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.btn-royal, .btn-emerald, .btn-gold, .btn-outline-royal {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
  border-radius: 9999px; padding: 0.875rem 1.75rem; font-size: 0.875rem; font-weight: 600;
  letter-spacing: 0.025em; text-transform: uppercase; transition: all 0.3s; white-space: nowrap;
}
.btn-royal { background: var(--gradient-royal); color: var(--primary-foreground); box-shadow: var(--shadow-elegant); }
.btn-royal:hover { transform: translateY(-2px); box-shadow: 0 25px 70px -20px color-mix(in oklab, var(--navy) 50%, transparent); }
.btn-emerald { background-color: var(--emerald); color: var(--accent-foreground); }
.btn-emerald:hover { background-color: var(--emerald-soft); transform: translateY(-2px); }
.btn-gold { background: var(--gradient-gold); color: var(--navy-deep); box-shadow: var(--shadow-gold); }
.btn-gold:hover { transform: translateY(-2px); }
.btn-outline-royal { border: 2px solid var(--navy); color: var(--navy); background-color: transparent; }
.btn-outline-royal:hover { background-color: var(--navy); color: var(--primary-foreground); }
.btn-outline-royal.on-dark { border-color: #fff; color: #fff; }
.btn-outline-royal.on-dark:hover { background-color: #fff; color: var(--navy-deep); }
.btn-emerald:disabled, .btn-royal:disabled { opacity: 0.6; cursor: default; }

.card-royal {
  border-radius: 1rem; background-color: var(--card); overflow: hidden;
  transition: all 0.5s; box-shadow: var(--shadow-card); display: flex; flex-direction: column;
}
.card-royal:hover { transform: translateY(-6px); box-shadow: var(--shadow-elegant); }

.eyebrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.25em; color: var(--emerald); }
.eyebrow.center { justify-content: center; }
.eyebrow.gold { color: var(--gold) !important; }
.divider-gold { display: inline-block; height: 1px; width: 3rem; vertical-align: middle; background: var(--gradient-gold); }

@keyframes float-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes reveal-up { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scroll-x { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.animate-float { animation: float-soft 4s ease-in-out infinite; }

.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1), transform 0.9s cubic-bezier(0.22,1,0.36,1); }
.reveal.shown { opacity: 1; transform: translateY(0); }

/* Layout */
#app { display: flex; min-height: 100vh; flex-direction: column; }
main { flex: 1; }

/* Header */
header.site-header { position: sticky; top: 0; z-index: 40; border-bottom: 1px solid color-mix(in oklab, var(--border) 60%, transparent); background-color: color-mix(in oklab, var(--background) 85%, transparent); backdrop-filter: blur(20px); }
.top-bar { background-color: #25D366; }
.top-bar-inner { display: flex; align-items: center; justify-content: center; padding: 0.4rem 0; }
.top-bar-wa { display: inline-flex; align-items: center; gap: 0.5rem; color: #fff; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.01em; }
.top-bar-wa svg { height: 1rem; width: 1rem; flex-shrink: 0; }
@media (min-width: 640px) { .top-bar-wa { font-size: 0.875rem; } }
.header-inner { display: flex; height: 5rem; align-items: center; justify-content: space-between; gap: 1rem; }
.logo { display: flex; align-items: center; gap: 0.625rem; flex-shrink: 0; }
.logo svg { height: 2.5rem; width: 2.5rem; flex-shrink: 0; }
.logo-text { display: flex; flex-direction: column; line-height: 1; }
.logo-text .l1 { font-family: var(--font-display); font-size: 1.125rem; font-weight: 600; letter-spacing: 0.025em; color: var(--primary); }
.logo-text .l2 { font-family: var(--font-display); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.3em; }
footer .logo-text .l1, footer .logo-text .l2 { color: #fff !important; -webkit-text-fill-color: #fff; }

nav.main-nav { display: none; align-items: center; gap: 2rem; }
@media (min-width: 1024px) { nav.main-nav { display: flex; } }
nav.main-nav a { font-size: 0.875rem; font-weight: 500; color: color-mix(in oklab, var(--primary) 80%, transparent); transition: color 0.2s; }
nav.main-nav a:hover, nav.main-nav a.active { color: var(--primary); font-weight: 600; }

.header-actions { display: flex; align-items: center; gap: 0.5rem; }
.icon-btn { position: relative; display: grid; place-items: center; height: 2.75rem; width: 2.75rem; border-radius: 9999px; border: 1px solid var(--border); color: var(--primary); transition: all 0.2s; }
.icon-btn:hover { border-color: var(--primary); background-color: var(--primary); color: var(--primary-foreground); }
.cart-badge { position: absolute; top: -0.25rem; right: -0.25rem; display: grid; place-items: center; height: 1.25rem; width: 1.25rem; border-radius: 9999px; background-color: var(--emerald); font-size: 0.625rem; font-weight: 700; color: #fff; }
.menu-toggle { display: grid; place-items: center; height: 2.75rem; width: 2.75rem; border-radius: 9999px; border: 1px solid var(--border); color: var(--primary); }
@media (min-width: 1024px) { .menu-toggle { display: none; } }

.mobile-nav { border-top: 1px solid var(--border); background-color: var(--background); }
@media (min-width: 1024px) { .mobile-nav { display: none; } }
.mobile-nav-inner { display: flex; flex-direction: column; gap: 0.25rem; padding: 1rem 0; }
.mobile-nav a { border-radius: 0.5rem; padding: 0.625rem 0.75rem; font-size: 1rem; font-weight: 500; color: color-mix(in oklab, var(--primary) 85%, transparent); }
.mobile-nav a:hover, .mobile-nav a.active { background-color: var(--secondary); color: var(--primary); font-weight: 600; }

/* Hero carousel */
.hero-carousel { position: relative; }
.hero-track-wrap { overflow: hidden; }
.hero-track { display: flex; transition: transform 0.6s cubic-bezier(0.4,0,0.2,1); }
.hero-slide { position: relative; min-width: 0; flex: 0 0 100%; }
.hero-img-wrap { position: relative; height: 46vh; min-height: 360px; max-height: 480px; width: 100%; overflow: hidden; }
.hero-img-wrap img { height: 100%; width: 100%; object-fit: cover; transform-origin: center center; will-change: transform; }
@keyframes hero-zoom { from { transform: scale(1); } to { transform: scale(1.12); } }
.hero-img-wrap img.kenburns { animation: hero-zoom 7s ease-out forwards; }
.hero-overlay { position: absolute; inset: 0; background: linear-gradient(90deg, color-mix(in oklab, var(--navy-deep) 85%, transparent) 0%, color-mix(in oklab, var(--navy-deep) 55%, transparent) 45%, transparent 100%); }
.hero-content-wrap { position: absolute; inset: 0; display: flex; align-items: center; }
.hero-content { max-width: 42rem; color: #fff; }
.hero-content h1 { margin-top: 1.25rem; font-size: 2.5rem; line-height: 1.05; }
@media (min-width: 640px) { .hero-content h1 { font-size: 3rem; } }
@media (min-width: 768px) { .hero-content h1 { font-size: 3.75rem; } }
@media (min-width: 1024px) { .hero-content h1 { font-size: 4.5rem; } }
.hero-cta { margin-top: 2rem; display: flex; flex-wrap: wrap; gap: 0.75rem; }
.hero-dots { position: absolute; bottom: 1.5rem; left: 0; right: 0; z-index: 10; display: flex; justify-content: center; gap: 0.5rem; }
.hero-dots button { height: 0.25rem; border-radius: 9999px; background-color: rgba(255,255,255,0.4); width: 1.25rem; transition: all 0.5s; }
.hero-dots button.active { width: 2.5rem; background-color: var(--gold); }

/* Sections generic */
.section { padding: 5rem 0; }
@media (min-width: 640px) { .section { padding: 7rem 0; } }
.section.tight { padding: 4rem 0; }
@media (min-width: 640px) { .section.tight { padding: 6rem 0; } }
.section.secondary-bg { background-color: var(--secondary); }
.section-head-row { display: flex; flex-direction: column; align-items: flex-start; justify-content: space-between; gap: 1rem; }
@media (min-width: 640px) { .section-head-row { flex-direction: row; align-items: flex-end; } }
.see-all { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; font-weight: 600; color: var(--primary); }
.see-all svg { transition: transform 0.2s; }
.see-all:hover svg { transform: translateX(4px); }

h2.h-section { margin-top: 0.75rem; font-size: 2.25rem; color: var(--primary); }
@media (min-width: 640px) { h2.h-section { font-size: 3rem; } }

/* Brand intro */
.intro-grid { display: grid; align-items: center; gap: 3rem; }
@media (min-width: 1024px) { .intro-grid { grid-template-columns: 1fr 1fr; } }
.intro-grid h2 { margin-top: 1rem; font-size: 2.25rem; color: var(--primary); }
@media (min-width: 640px) { .intro-grid h2 { font-size: 3rem; } }
.intro-grid p.lead { margin-top: 1.5rem; font-size: 1rem; line-height: 1.7; color: var(--muted-foreground); }
@media (min-width: 640px) { .intro-grid p.lead { font-size: 1.125rem; } }
.intro-cta { margin-top: 2rem; display: flex; flex-wrap: wrap; gap: 0.75rem; }
.feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.feature-card { border-radius: 1rem; border: 1px solid var(--border); background-color: var(--card); padding: 1.25rem; transition: all 0.2s; }
.feature-card:hover { border-color: var(--emerald); box-shadow: var(--shadow-card); }
.feature-card .ic { display: grid; place-items: center; height: 2.75rem; width: 2.75rem; border-radius: 9999px; background-color: var(--navy-deep); color: var(--gold); }
.feature-card .ft { margin-top: 1rem; font-family: var(--font-display); font-size: 1.125rem; color: var(--primary); }
.feature-card .fd { font-size: 0.875rem; color: var(--muted-foreground); }

/* Product grid — reproduit les breakpoints Tailwind d'origine (mobile:1 col) */
.product-grid { margin-top: 2.5rem; display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
/* Featured (accueil) : sm:2 lg:4 */
@media (min-width: 640px) { .product-grid.cols-4 { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (min-width: 1024px) { .product-grid.cols-4 { grid-template-columns: repeat(4, minmax(0,1fr)); } }
/* Boutique : sm:2 lg:3 xl:4 */
@media (min-width: 640px) { .product-grid.boutique { grid-template-columns: repeat(2, minmax(0,1fr)); } }
@media (min-width: 1024px) { .product-grid.boutique { grid-template-columns: repeat(3, minmax(0,1fr)); } }
@media (min-width: 1280px) { .product-grid.boutique { grid-template-columns: repeat(4, minmax(0,1fr)); } }
/* 2 produits : centré, max 2 cols, cartes larges */
.product-grid.cols-2 { max-width: 56rem; margin-left: auto; margin-right: auto; }
@media (min-width: 640px) { .product-grid.cols-2 { grid-template-columns: repeat(2, minmax(0,1fr)); } }

/* Mini-cartes produits (page d'accueil) — aperçu compact, pas la fiche complète */
.mini-product-grid { margin-top: 2.5rem; display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 1rem; }
@media (min-width: 640px) { .mini-product-grid { grid-template-columns: repeat(3, minmax(0,1fr)); } }
@media (min-width: 1024px) { .mini-product-grid { grid-template-columns: repeat(4, minmax(0,1fr)); } }
.mini-product-card { display: flex; flex-direction: column; border-radius: 0.75rem; border: 1px solid var(--border); background-color: var(--card); overflow: hidden; transition: all 0.2s; }
.mini-product-card:hover { border-color: var(--emerald); box-shadow: var(--shadow-card); }
.mini-product-img { position: relative; aspect-ratio: 1/1; background-color: var(--navy-deep); overflow: hidden; }
.mini-product-img img { height: 100%; width: 100%; object-fit: cover; }
.mini-product-info { padding: 0.75rem 0.9rem; }
.mini-product-name { font-size: 0.85rem; font-weight: 600; color: var(--primary); line-height: 1.25; }
.mini-product-price { margin-top: 0.25rem; font-size: 0.85rem; font-weight: 600; color: var(--emerald); }

/* Grille d'avis statique (accueil) — pas de défilement, juste quelques cartes */
.testi-static-grid { margin-top: 3rem; display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
@media (min-width: 768px) { .testi-static-grid { grid-template-columns: repeat(3, minmax(0,1fr)); } }

.product-card-img { position: relative; display: block; aspect-ratio: 1/1; overflow: hidden; background-color: var(--navy-deep); }
.product-card-img img { height: 100%; width: 100%; object-fit: cover; transition: transform 1.2s ease-out; }
.product-card-img:hover img { transform: scale(1.1); }
.product-badge { position: absolute; top: 1rem; left: 1rem; z-index: 10; border-radius: 9999px; padding: 0.25rem 0.75rem; font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; background-color: var(--gold); color: var(--navy-deep); }
.product-badge.promo { background-color: var(--promo); color: #fff; }

/* Bouton Commander en overlay sur l'image */
.card-img-overlay { position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 1rem; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 60%); }
.product-card-img:hover .card-img-overlay { opacity: 1; pointer-events: auto; }
.btn-order-now { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.2rem; background-color: var(--emerald); color: #fff; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border: none; cursor: pointer; transition: background-color 0.2s, transform 0.2s; white-space: nowrap; }
.btn-order-now:hover { background-color: var(--emerald-soft); transform: translateY(-2px); }
.product-card-body { display: flex; flex: 1; flex-direction: column; gap: 0.75rem; padding: 1.25rem; }
.product-card-body h3 { margin-top: 0.375rem; font-size: 1.25rem; color: var(--primary); }
.product-card-body h3 a:hover { color: var(--emerald); }
.product-card-footer { margin-top: auto; display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding-top: 0.5rem; }
.price-row { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; }
.price-now { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--primary); }
.price-old { font-size: 0.75rem; color: var(--muted-foreground); text-decoration: line-through; }
.add-cart-btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem; padding: 0.6rem 1.2rem; border-radius: 9999px; background-color: var(--primary); color: var(--primary-foreground); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
.add-cart-btn:hover { background-color: var(--emerald); }
.min-qty-badge { display: inline-block; margin-top: 0.5rem; padding: 0.35rem 0.7rem; background-color: #fef3c7; border-radius: 0.4rem; font-size: 0.75rem; font-weight: 600; color: #92400e; text-transform: uppercase; letter-spacing: 0.05em; }
.pd-minqty-note { margin-top: 0.75rem; padding: 0.75rem 1rem; background-color: #fef3c7; border-left: 3px solid #f59e0b; border-radius: 0.4rem; font-size: 0.9rem; color: #92400e; line-height: 1.5; }

/* Stats band */
.stats-band { position: relative; overflow: hidden; background-color: var(--navy-deep); padding: 4rem 0; color: #fff; }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
@media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
.stat { text-align: center; }
.stat .val { font-family: var(--font-display); font-size: 3rem; font-weight: 600; color: var(--gold); }
@media (min-width: 640px) { .stat .val { font-size: 3.75rem; } }
.stat .lbl { margin-top: 0.5rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.25em; color: rgba(255,255,255,0.7); }

/* Why grid */
.why-grid { margin-top: 3.5rem; display: grid; gap: 2rem; }
@media (min-width: 768px) { .why-grid { grid-template-columns: repeat(3, 1fr); } }
.why-card { position: relative; height: 100%; border-radius: 1rem; border: 1px solid var(--border); background-color: var(--card); padding: 2rem; }
.why-card .num { font-family: var(--font-display); font-size: 3rem; color: var(--gold); }
.why-card h3 { margin-top: 1rem; font-size: 1.5rem; color: var(--primary); }
.why-card p { margin-top: 0.75rem; color: var(--muted-foreground); }

/* Testimonials scroller */
.testi-scroller { margin-top: 3rem; overflow: hidden; }
.testi-track { display: flex; gap: 1.5rem; width: max-content; animation: scroll-x 60s linear infinite; }
.testi-scroller:hover .testi-track { animation-play-state: paused; }
.testi-card { width: 320px; flex-shrink: 0; border-radius: 1rem; background-color: var(--card); padding: 1.5rem; box-shadow: var(--shadow-card); }
.testi-card.full { width: auto; position: relative; }
.stars { display: flex; gap: 0.125rem; color: var(--gold); }
.stars svg { height: 1rem; width: 1rem; fill: currentColor; }
.testi-card p.txt { margin-top: 1rem; font-size: 0.875rem; line-height: 1.6; color: color-mix(in oklab, var(--foreground) 85%, transparent); }
.testi-card .who { margin-top: 1.25rem; border-top: 1px solid var(--border); padding-top: 1rem; }
.testi-card .who .name { font-family: var(--font-display); font-size: 1rem; color: var(--primary); }

<script>
/* ===========================================================
   Performance Royale — Panier (localStorage)
   =========================================================== */

/* Sécurité XSS : échappe tout texte contrôlé par l'utilisateur
   (formulaire de commande, contact, etc.) avant de l'insérer via
   innerHTML / template literals. À utiliser sur CHAQUE valeur qui
   provient d'un input, jamais sur du HTML de confiance. */
function escapeHtml(value) {
  if (value === null || value === undefined) return "";
  return String(value).replace(/[&<>"']/g, (ch) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  }[ch]));
}

const CART_STORAGE_KEY = "pr-cart";

const Cart = {
  items: [],

  load() {
    try {
      const raw = localStorage.getItem(CART_STORAGE_KEY);
      this.items = raw ? JSON.parse(raw) : [];
    } catch {
      this.items = [];
    }
  },

  persist() {
    try { localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(this.items)); } catch {}
  },

  add(productId, qty = 1) {
    const found = this.items.find((i) => i.productId === productId);
    if (found) {
      found.quantity += qty;
    } else {
      this.items.push({ productId, quantity: qty });
    }
    this.persist();
    updateCartBadge();
  },

  remove(productId) {
    this.items = this.items.filter((i) => i.productId !== productId);
    this.persist();
    updateCartBadge();
  },

  setQty(productId, qty) {
    const item = this.items.find((i) => i.productId === productId);
    if (item) {
      const product = typeof getProduct_byId === "function" ? getProduct_byId(productId) : null;
      const floor = product && product.minQty && product.minQty > 1 ? product.minQty : 1;
      item.quantity = Math.max(floor, qty);
    }
    this.persist();
    updateCartBadge();
  },

  clear() {
    this.items = [];
    this.persist();
    updateCartBadge();
  },

  detailedItems() {
    return this.items
      .map((i) => ({ product: getProduct_byId(i.productId), quantity: i.quantity }))
      .filter((i) => i.product);
  },

  total() {
    return this.detailedItems().reduce((s, i) => s + i.product.price * i.quantity, 0);
  },

  count() {
    return this.items.reduce((s, i) => s + i.quantity, 0);
  },
};

function getProduct_byId(id) {
  return products.find((p) => p.id === id);
}

function updateCartBadge() {
  const badge = document.getElementById("cart-badge");
  const count = Cart.count();
  if (!badge) return;
  if (count > 0) {
    badge.textContent = String(count);
    badge.style.display = "grid";
  } else {
    badge.style.display = "none";
  }
}

/* ---- Order submission (mode démo, comme le code source d'origine) ---- */
const ORDERS_CONFIG = {
  APPS_SCRIPT_URL: "",
  API_ENDPOINT: "",
};

/* Horaires de travail Performance Royale
   Lundi-Vendredi : 9h-16h30
   Samedi : 9h-12h
   Dimanche : Fermé */
function getNextContactMessage() {
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=dimanche, 1=lundi, ..., 6=samedi
  const hours = now.getHours();
  const minutes = now.getMinutes();
  const currentTime = hours + minutes / 60;

  const WORK_SCHEDULE = {
    1: { open: 9, close: 16.5 }, // Lundi 9h-16h30
    2: { open: 9, close: 16.5 }, // Mardi 9h-16h30
    3: { open: 9, close: 16.5 }, // Mercredi 9h-16h30
    4: { open: 9, close: 16.5 }, // Jeudi 9h-16h30
    5: { open: 9, close: 16.5 }, // Vendredi 9h-16h30
    6: { open: 9, close: 12 },   // Samedi 9h-12h
    0: null                       // Dimanche fermé
  };

  const schedule = WORK_SCHEDULE[dayOfWeek];

  // Cas 1 : On est ouvert maintenant (lun-ven ou samedi pendant les heures)
  if (schedule && currentTime >= schedule.open && currentTime < schedule.close) {
    return "Notre équipe vous recontactera dans quelques heures pour organiser votre colis.";
  }

  // Cas 2 : Lundi-vendredi après 16h30 → demain à 9h
  if (dayOfWeek >= 1 && dayOfWeek <= 5 && currentTime >= schedule.close) {
    return "Notre équipe vous recontactera demain à 9h pour organiser votre colis.";
  }

  // Cas 3 : Samedi après 12h → lundi à 9h
  if (dayOfWeek === 6) {
    return "Notre équipe vous recontactera lundi à 9h pour organiser votre colis.";
  }

  // Cas 4 : Dimanche ou lundi avant 9h → lundi à 9h
  if (dayOfWeek === 0 || (dayOfWeek === 1 && currentTime < 9)) {
    return "Notre équipe vous recontactera lundi à 9h pour organiser votre colis.";
  }

  // Fallback
  return "Notre équipe vous recontactera dans les plus brefs délais pour organiser votre colis.";
}

async function submitOrder(order) {
  const endpoint = ORDERS_CONFIG.APPS_SCRIPT_URL || ORDERS_CONFIG.API_ENDPOINT;
  // Sauvegarder en local dans tous les cas
  try {
    const existing = JSON.parse(localStorage.getItem("pr-orders") || "[]");
    existing.push(order);
    localStorage.setItem("pr-orders", JSON.stringify(existing));
  } catch {}
  if (!endpoint) {
    // Mode démo — pas d'URL configurée, on confirme quand même
    return { ok: true };
  }
  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(order),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return { ok: true };
  } catch (e) {
    // Même si l'envoi échoue, on confirme car la commande est sauvegardée en local
    return { ok: true };
  }
}

/* ---- Toasts ---- */
function toast(message, type = "success") {
  const host = document.getElementById("toast-host");
  if (!host) return;
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = message;
  host.appendChild(el);
  setTimeout(() => { el.remove(); }, 3200);
}

let heroIndex = 0;
let heroInterval = null;

function renderHeroCarousel() {
  const slides = HERO_SLIDES.map((s) => `
    <div class="hero-slide">
      <div class="hero-img-wrap">
        <img src="${s.img}" alt="${s.title}" />
        <div class="hero-overlay"></div>

              <p class="eyebrow gold"><span class="divider-gold"></span> ${s.eyebrow}</p>
              <h1>${s.title}</h1>

                <a href="#/boutique" class="btn-gold">Découvrir la boutique</a>
                <a href="#/temoignages" class="btn-outline-royal on-dark">Voir les témoignages</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`).join("");

  const dots = HERO_SLIDES.map((_, i) => `<button data-hero-dot="${i}" class="${i === 0 ? "active" : ""}" aria-label="Slide ${i + 1}"></button>`).join("");

  return `
  <section class="hero-carousel">
    <div class="hero-track-wrap">
      <div class="hero-track" id="hero-track">${slides}</div>
    </div>
    <div class="hero-dots">${dots}</div>
  </section>`;
}

function initHeroCarousel() {
  const track = document.getElementById("hero-track");
  const wrap = document.querySelector(".hero-track-wrap");
  if (!track || !wrap) return;
  heroIndex = 0;
  clearInterval(heroInterval);

  function goTo(i) {
    heroIndex = (i + HERO_SLIDES.length) % HERO_SLIDES.length;
    track.style.transition = "transform 0.6s cubic-bezier(0.4,0,0.2,1)";
    track.style.transform = `translateX(-${heroIndex * 100}%)`;
    document.querySelectorAll("[data-hero-dot]").forEach((d) => {
      d.classList.toggle("active", Number(d.dataset.heroDot) === heroIndex);
    });
    restartKenBurns(heroIndex);
  }

  function restartKenBurns(i) {
    const slides = document.querySelectorAll(".hero-slide");
    slides.forEach((slideEl, idx) => {
      const img = slideEl.querySelector("img");
      if (!img) return;
      if (idx === i) {
        img.classList.remove("kenburns");
        void img.offsetWidth; // force reflow pour relancer l'animation
        img.classList.add("kenburns");
      } else {
        img.classList.remove("kenburns");
      }
    });
  }

  function restartAutoplay() {
    clearInterval(heroInterval);
    heroInterval = setInterval(() => goTo(heroIndex + 1), 6000);
  }

  document.querySelectorAll("[data-hero-dot]").forEach((d) => {
    d.addEventListener("click", () => { goTo(Number(d.dataset.heroDot)); restartAutoplay(); });
  });

  // --- Swipe / drag support (souris + tactile), comme Embla Carousel ---
  let dragOffset = 0;
  let startX = 0;
  let dragging = false;
  const wrapWidth = () => wrap.offsetWidth || 1;

  function onDragStart(clientX) {
    dragging = true;
    startX = clientX;
    dragOffset = 0;
    track.style.transition = "none";
    clearInterval(heroInterval);
  }
  function onDragMove(clientX) {
    if (!dragging) return;
    dragOffset = clientX - startX;
    track.style.transform = `translateX(calc(-${heroIndex * 100}% + ${dragOffset}px))`;
  }
  function onDragEnd() {
    if (!dragging) return;
    dragging = false;
    track.style.transition = "transform 0.6s cubic-bezier(0.4,0,0.2,1)";
    const threshold = wrapWidth() * 0.15;
    if (dragOffset < -threshold) {
      goTo(heroIndex + 1);
    } else if (dragOffset > threshold) {
      goTo(heroIndex - 1);
    } else {
      goTo(heroIndex);
    }
    dragOffset = 0;
    restartAutoplay();
  }

  // Touch (mobile)
  wrap.addEventListener("touchstart", (e) => onDragStart(e.touches[0].clientX), { passive: true });
  wrap.addEventListener("touchmove", (e) => onDragMove(e.touches[0].clientX), { passive: true });
  wrap.addEventListener("touchend", onDragEnd);

  // Souris (desktop)
  wrap.addEventListener("mousedown", (e) => { e.preventDefault(); onDragStart(e.clientX); });
  window.addEventListener("mousemove", (e) => onDragMove(e.clientX));
  window.addEventListener("mouseup", onDragEnd);
  wrap.style.cursor = "grab";

  restartKenBurns(0);
  restartAutoplay();
}

/* ---- Reveal-on-scroll ---- */
function initReveals(root) {
  const els = (root || document).querySelectorAll(".reveal");
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
      if (e.isIntersecting) {
        e.target.classList.add("shown");
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  els.forEach((el) => io.observe(el));
}

function revealWrap(html, delayMs) {
  const style = delayMs ? ` style="transition-delay:${delayMs}ms"` : "";
  return `<div class="reveal"${style}>${html}</div>`;
}

/* ---- Animated Counters ---- */
function initCounters(root) {
  const els = (root || document).querySelectorAll("[data-counter-end]");
  const io = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting || entry.target.dataset.started) return;
      entry.target.dataset.started = "1";
      const end = Number(entry.target.dataset.counterEnd);
      const suffix = entry.target.dataset.counterSuffix || "";
      const duration = 1800;
      const start = performance.now();
      function step(t) {
        const p = Math.min((t - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        entry.target.textContent = Math.round(end * eased).toLocaleString("fr-FR") + suffix;
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
      io.unobserve(entry.target);
    });
  }, { threshold: 0.4 });
  els.forEach((el) => io.observe(el));
}

function initPanierEvents() {
  document.querySelectorAll('[data-action="cart-qty-dec"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const item = Cart.items.find((i) => i.productId === id);
      if (item) Cart.setQty(id, item.quantity - 1);
      router();
    });
  });
  document.querySelectorAll('[data-action="cart-qty-inc"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const item = Cart.items.find((i) => i.productId === id);
      if (item) Cart.setQty(id, item.quantity + 1);
      router();
    });
  });
  document.querySelectorAll('[data-action="cart-remove"]').forEach((btn) => {
    btn.addEventListener("click", () => {
      Cart.remove(btn.dataset.id);
      router();
    });
  });

  const form = document.getElementById("order-form");
  if (!form) return;

  form.querySelectorAll("input[name]").forEach((input) => {
    input.addEventListener("input", () => {
      if (input.type === "radio") return;
      orderForm[input.name] = input.value;
      if (input.name === "city") {
        // Re-render seulement la section paiement sans toucher aux inputs
        const isAbi = input.value.toLowerCase().includes("abidjan");
        const payNote = document.querySelector(".pay-note");
        const codOption = document.querySelector(".pay-option-cod");
        if (payNote) payNote.style.display = isAbi ? "none" : "block";
        if (codOption) codOption.style.display = isAbi ? "block" : "none";
      }
    });
  });
  form.querySelectorAll('input[name="paymentMethod"]').forEach((input) => {
    input.addEventListener("change", () => {
      orderForm.paymentMethod = input.value;
      router();
    });
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const items = Cart.detailedItems();
    if (items.length === 0) { toast("Votre panier est vide", "error"); return; }
    if (!orderForm.firstName || !orderForm.lastName || !orderForm.phone || !orderForm.city) {
      toast("Veuillez remplir tous les champs obligatoires", "error");
      return;
    }
    orderSubmitting = true;
    // Désactiver le bouton sans re-render toute la page
    const submitBtn = form.querySelector(".submit-order-btn");
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "Envoi..."; }
    const frais = orderForm.city.trim().toLowerCase() === "abidjan" ? 1000 : 2000;
    const res = await submitOrder({
      ...orderForm,
      items: items.map((i) => ({ id: i.product.id, name: i.product.name, quantity: i.quantity, price: i.product.price })),
      sousTotal: Cart.total(),
      fraisLivraison: frais,
      total: Cart.total() + frais,
      createdAt: new Date().toISOString(),
    });
    orderSubmitting = false;
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "Confirmer la commande"; }
    if (res.ok) {
      Cart.clear();
      orderForm = { firstName: "", lastName: "", phone: "", city: "Abidjan", district: "", paymentMethod: "cod" };
      // Afficher la page de confirmation
      const main = document.getElementById("main-content");
      const contactMessage = getNextContactMessage();
      main.innerHTML = `
        <section style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
          <div style="max-width:500px;width:100%;text-align:center;animation:fadeIn 0.5s ease;">
            <div style="font-size:4rem;margin-bottom:1rem;">👑</div>
            <h1 style="font-family:'Cormorant Garamond',serif;color:var(--navy);font-size:2.2rem;margin:0 0 1rem;">
              Merci pour votre commande !
            </h1>
            <div style="width:60px;height:2px;background:var(--gold);margin:0 auto 1.5rem;"></div>
            <p style="color:var(--muted-foreground);font-size:1.05rem;line-height:1.7;margin-bottom:1rem;">
              Votre commande a bien été enregistrée.
            </p>
            <p style="color:var(--emerald);font-size:1.05rem;line-height:1.7;margin-bottom:2rem;font-weight:500;">
              ${contactMessage}
            </p>
            <div style="background:linear-gradient(135deg,oklch(0.15 0.05 240),oklch(0.2 0.06 240));border-radius:1rem;padding:1.5rem;margin-bottom:2rem;">
              <p style="color:rgba(255,255,255,0.8);font-size:0.9rem;margin:0 0 0.5rem;">Une question ? Contactez-nous directement</p>
              <a href="https://wa.me/${SITE.whatsapp}" target="_blank"
                style="display:inline-flex;align-items:center;gap:0.5rem;background:#25D366;color:white;padding:0.75rem 1.5rem;border-radius:2rem;text-decoration:none;font-weight:600;font-size:0.95rem;">
                💬 Nous contacter sur WhatsApp
              </a>
            </div>
            <a href="#/" style="display:inline-block;padding:0.75rem 2rem;border:1px solid var(--border);border-radius:2rem;color:var(--navy);text-decoration:none;font-weight:500;">
              Retour à l'accueil
            </a>
          </div>
        </section>`;
      window.scrollTo(0, 0);
    } else {
      toast(res.message, "error");
      router();
    }
  });
}

function router() {
  const hash = currentHash();
  const main = document.getElementById("main-content");
  window.scrollTo(0, 0);

  let html = "";
  let after = null;

  if (hash === "/") {
    html = renderHome();
    after = () => { initHeroCarousel(); initReveals(main); initCounters(main); };
  } else if (hash === "/boutique") {
    html = renderBoutique();
    after = () => initReveals(main);
  } else if (hash.startsWith("/produit/")) {
    const slug = hash.replace("/produit/", "");
    const product = getProduct(slug);
    html = renderProductDetail(slug);
    if (product) after = () => initProductDetailEvents(product.id);
  } else if (hash === "/panier") {
    html = renderPanier();
    after = () => initPanierEvents();
  } else if (hash === "/contact") {
    html = renderContact();
    after = () => initContactEvents();
  } else if (hash === "/faq") {
    html = renderFaqPage();
  } else if (hash === "/temoignages") {
    html = renderTemoignages();
    after = () => initReveals(main);
  } else if (hash === "/conditions") {
    html = renderConditions();
  } else if (hash === "/confidentialite") {
    html = renderConfidentialite();
  } else if (hash === "/admin") {
    html = renderAdminLogin();
    after = () => initAdminLoginEvents();
  } else if (hash === "/admin/dashboard") {
    if (!isAdminLoggedIn()) {
      window.location.hash = "/admin";
      return;
    }
    html = renderAdminDashboard();
  } else {
    html = renderNotFound();
  }

  main.innerHTML = html;
  if (after) after();

  // Update header nav active states + mobile menu close
  document.getElementById("main-nav").innerHTML = navHtml(false);
  document.getElementById("mobile-nav").querySelector(".mobile-nav-inner").innerHTML = navHtml(true);
  document.getElementById("mobile-nav").style.display = "none";

  bindAddToCartButtons();
}

const ADMIN_HASH = "02f4d885943e65373002fc90dd3bb3bb3dd2d8ec64c80b3a5a968719dceee68d";

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

    const input = document.getElementById("admin-password-input").value;
    const hashed = await sha256(input);
    if (hashed === ADMIN_HASH) {
      sessionStorage.setItem("admin_auth", "true");
      window.location.hash = "/admin/dashboard";
    } else {
      document.getElementById("admin-login-error").style.display = "block";
    }
  });
}

// URLs carousel modifiables depuis l'admin
let carouselUrls = [
  document.querySelector && document.querySelector(".hero-slide:nth-child(1) .hero-bg") 
    ? getComputedStyle(document.querySelector(".hero-slide:nth-child(1) .hero-bg")).backgroundImage 
    : "",
  "", "", ""
];

function saveCarouselUrls() {
  [1,2,3,4].forEach(n => {
    const val = document.getElementById("admin-carousel-" + n).value.trim();
    carouselUrls[n-1] = val;
    // Mettre à jour l'aperçu
    const preview = document.getElementById("carousel-preview-" + n);
    if (preview && val) {
      preview.innerHTML = `<img src="${val}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'" />`;
    }
    // Mettre à jour le slide dans le carousel si visible
    const slides = document.querySelectorAll(".hero-slide");
    if (slides[n-1] && val) {
      const bg = slides[n-1].querySelector(".hero-bg");
      if (bg) bg.style.backgroundImage = `url(${val})`;
    }
  });
  localStorage.setItem("pr_carousel_urls", JSON.stringify(carouselUrls));
  toast("Images du carousel mises à jour ✓", "success");
}

function switchAdminTab(tab) {
  ["produits","parametres","carousel","motdepasse"].forEach(t => {
    document.getElementById("tab-" + t).style.display = t === tab ? "block" : "none";
  });
  document.querySelectorAll(".admin-tab").forEach(btn => {
    const isActive = btn.dataset.tab === tab;
    btn.style.borderBottom = isActive ? "2px solid var(--navy)" : "2px solid transparent";
    btn.style.color = isActive ? "var(--navy)" : "var(--muted-foreground)";
    btn.style.fontWeight = isActive ? "600" : "400";
  });
}

function showAdminEditProduct(id) {
  const p = getProduct_byId(id);
  if (!p) return;

  // Reset listes
  adminBenefits = p.benefits ? [...p.benefits] : [];
  adminIngredients = p.ingredients ? [...p.ingredients] : [];
  adminImageBase64 = "";

  document.getElementById("admin-prod-id").value = p.id;
  document.getElementById("admin-form-title").textContent = "Modifier : " + p.name;
  document.getElementById("admin-prod-name").value = p.name;
  document.getElementById("admin-prod-tagline").value = p.tagline;
  document.getElementById("admin-prod-price").value = p.price;
  document.getElementById("admin-prod-oldprice").value = p.oldPrice || "";
  document.getElementById("admin-prod-desc").value = p.description;
  document.getElementById("admin-prod-usage").value = p.usage || "";
  document.getElementById("admin-prod-badge").value = p.badge || "";
  document.getElementById("admin-prod-minqty").value = p.minQty && p.minQty > 1 ? p.minQty : "";

  // Aperçu image existante
  if (p.image) {
    document.getElementById("admin-prod-image-preview").innerHTML = `
      <img src="${p.image}" style="width:100%;max-height:150px;object-fit:contain;border-radius:0.5rem;" />
      <div style="font-size:0.75rem;color:var(--muted-foreground);margin-top:0.5rem;">Image actuelle — appuie pour changer</div>
    `;
  }

  document.getElementById("admin-product-form").style.display = "block";
  document.getElementById("admin-product-form").scrollIntoView({behavior:"smooth"});

  // Render listes après affichage du DOM
  setTimeout(() => {
    renderAdminBenefitsList();
    renderAdminIngredientsList();
  }, 50);
}

// Variables temporaires pour les listes
let adminBenefits = [];
let adminIngredients = [];
let adminImageBase64 = "";

function previewAdminImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    adminImageBase64 = e.target.result;
    document.getElementById("admin-prod-image-preview").innerHTML = `
      <img src="${e.target.result}" style="width:100%;max-height:150px;object-fit:contain;border-radius:0.5rem;" />
      <div style="font-size:0.75rem;color:var(--emerald);margin-top:0.5rem;">✓ Photo chargée</div>
    `;
  };
  reader.readAsDataURL(file);
}

function addAdminBenefit() {
  const input = document.getElementById("admin-benefit-input");

  if (!val) return;

  input.value = "";
  renderAdminBenefitsList();

function removeAdminBenefit(idx) {
  adminBenefits.splice(idx, 1);

function renderAdminBenefitsList() {
  const list = document.getElementById("admin-benefits-list");
  if (!list) return;
  list.innerHTML = adminBenefits.map((b, i) => `
    <div style="display:flex;align-items:center;gap:0.5rem;background:#f0fdf4;padding:0.5rem 0.75rem;border-radius:0.5rem;">
      <span style="flex:1;font-size:0.875rem;">✅ ${b}</span>
      <button type="button" onclick="removeAdminBenefit(${i})" style="background:none;border:none;color:#991b1b;cursor:pointer;font-size:1rem;">✕</button>
    </div>`).join("");
}

function addAdminIngredient() {
  const input = document.getElementById("admin-ingredient-input");
  const val = input.value.trim();
  if (!val) return;
  adminIngredients.push(val);
  input.value = "";
  renderAdminIngredientsList();
}

function removeAdminIngredient(idx) {
  adminIngredients.splice(idx, 1);
  renderAdminIngredientsList();
}

function renderAdminIngredientsList() {
  const list = document.getElementById("admin-ingredients-list");
  if (!list) return;
  list.innerHTML = adminIngredients.map((ing, i) => `
    <div style="display:flex;align-items:center;gap:0.5rem;background:#eff6ff;padding:0.5rem 0.75rem;border-radius:0.5rem;">
      <span style="flex:1;font-size:0.875rem;">💊 ${ing}</span>
      <button type="button" onclick="removeAdminIngredient(${i})" style="background:none;border:none;color:#991b1b;cursor:pointer;font-size:1rem;">✕</button>
    </div>`).join("");
}

function saveAdminProduct() {
  const id = document.getElementById("admin-prod-id").value;
  const name = document.getElementById("admin-prod-name").value.trim();
  const tagline = document.getElementById("admin-prod-tagline").value.trim();
  const price = parseInt(document.getElementById("admin-prod-price").value);
  const oldPrice = parseInt(document.getElementById("admin-prod-oldprice").value) || null;
  const description = document.getElementById("admin-prod-desc").value.trim();
  const usage = document.getElementById("admin-prod-usage").value.trim();
  const badge = document.getElementById("admin-prod-badge").value.trim();
  const minQtyRaw = parseInt(document.getElementById("admin-prod-minqty").value);
  const minQty = minQtyRaw && minQtyRaw > 1 ? minQtyRaw : undefined;
  const benefits = [...adminBenefits];
  const ingredients = [...adminIngredients];
  const image = adminImageBase64 || IMG.product1;

  if (!name || !tagline || !price || !description) {
    alert("Veuillez remplir tous les champs obligatoires (*)");
    return;
  }

  if (id) {
    const idx = products.findIndex(p => p.id === id);
    if (idx !== -1) {
      products[idx] = {
        ...products[idx], name, tagline, price, oldPrice, description,
        usage, badge, benefits, minQty,
        ingredients: ingredients.length > 0 ? ingredients : undefined,
        image: adminImageBase64 || products[idx].image,
        gallery: adminImageBase64 ? [adminImageBase64] : products[idx].gallery
      };
    }
  } else {
    const newId = String(Date.now());
    const slug = name.toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
    products.push({
      id: newId, slug, name, tagline, price, oldPrice, description,
      usage, badge, benefits, minQty,
      ingredients: ingredients.length > 0 ? ingredients : undefined,
      image, gallery: [image]
    });
  }

  // Reset
  adminBenefits = [];
  adminIngredients = [];
  adminImageBase64 = "";

  toast(id ? "Produit modifié ✓" : "Produit ajouté ✓", "success");
  window.location.hash = "/admin/dashboard";
  setTimeout(() => router(), 100);
}

function confirmDeleteProduct(id) {
  const p = getProduct_byId(id);
  if (!p) return;
  if (confirm("Supprimer le produit \"" + p.name + "\" ?")) {
    const idx = products.findIndex(pr => pr.id === id);
    if (idx !== -1) products.splice(idx, 1);
    toast("Produit supprimé", "success");
    window.location.hash = "/admin/dashboard";
    setTimeout(() => router(), 100);
  }
}

function saveAdminSettings() {
  SITE.name = document.getElementById("admin-site-name").value.trim();
  SITE.tagline = document.getElementById("admin-site-tagline").value.trim();
  SITE.whatsapp = document.getElementById("admin-site-whatsapp").value.trim();
  SITE.email = document.getElementById("admin-site-email").value.trim();
  toast("Paramètres enregistrés ✓", "success");
}

async function changeAdminPassword() {
  const current = document.getElementById("admin-pwd-current").value;
  const newPwd = document.getElementById("admin-pwd-new").value;
  const confirm2 = document.getElementById("admin-pwd-confirm").value;
  const msgEl = document.getElementById("admin-pwd-msg");

  const currentHash = await sha256(current);
  const storedHash = localStorage.getItem("admin_pwd_hash") || ADMIN_HASH;

  if (currentHash !== storedHash) {
    msgEl.style.display = "block";
    msgEl.style.background = "#fee2e2";
    msgEl.style.color = "#991b1b";
    msgEl.textContent = "Mot de passe actuel incorrect.";
    return;
  }
  if (newPwd.length < 6) {
    msgEl.style.display = "block";
    msgEl.style.background = "#fee2e2";
    msgEl.style.color = "#991b1b";
    msgEl.textContent = "Le nouveau mot de passe doit faire au moins 6 caractères.";
    return;
  }
  if (newPwd !== confirm2) {
    msgEl.style.display = "block";
    msgEl.style.background = "#fee2e2";
    msgEl.style.color = "#991b1b";
    msgEl.textContent = "Les deux mots de passe ne correspondent pas.";
    return;
  }

  const newHash = await sha256(newPwd);
  localStorage.setItem("admin_pwd_hash", newHash);
  msgEl.style.display = "block";
  msgEl.style.background = "#d1fae5";
  msgEl.style.color = "#065f46";
  msgEl.textContent = "Mot de passe changé avec succès ✓";
  document.getElementById("admin-pwd-current").value = "";
  document.getElementById("admin-pwd-new").value = "";
  document.getElementById("admin-pwd-confirm").value = "";
}


</script>

     NOTES DE SÉCURITÉ — à lire avant tout déploiement Netlify

     1. ADMIN NON SÉCURISÉ CÔTÉ SERVEUR (limitation structurelle)
        Ce panel admin vérifie le mot de passe uniquement en JS,
        dans le navigateur. Le hash ADMIN_HASH est visible dans le
        code source, et sessionStorage.setItem("admin_auth","true")
        suffit à contourner l'écran de connexion depuis la console.
        Aucune balise ou header ne peut corriger ça : tant que le
        site est un fichier HTML statique sans backend, il n'y a
        PAS de vraie sécurité admin possible. La seule solution
        durable est de déplacer la vérification du mot de passe
        dans une Netlify Function (le mot de passe/hash n'est alors
        jamais envoyé au navigateur avant validation).

     2. CSP ET onclick="..." INLINE
        Le panel admin utilise ~20 attributs onclick/onkeydown
        inline. Une CSP strictement conforme (script-src 'self'
        sans 'unsafe-inline') les bloquerait tous et casserait
        l'admin. Le choix fait ici est de garder 'unsafe-inline'
        sur script-src en attendant une conversion complète de ces
        handlers en addEventListener — un chantier à part, plus
        risqué à faire sans pouvoir tester dans un vrai navigateur.

     3. XSS CORRIGÉ
        Les champs du formulaire de commande et de contact (nom,
        téléphone, ville, email, message) sont maintenant échappés
        via escapeHtml() avant d'être réinjectés dans le HTML.
